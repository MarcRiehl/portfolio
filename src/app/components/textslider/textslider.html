<div class="slider-wrapper">
  <div class="slider">
    <div class="slider-inner">
      <div class="slider-track">
        @for (text of texts; track $index) {
          <span>{{ text }} ●</span>
        }

        @for (text of texts; track $index) {
          <span></span><span>{{ text }} ●</span>
        }
      </div>
    </div>
  </div>
</div>
